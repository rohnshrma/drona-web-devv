<!DOCTYPE html>
<html lang="en">
  <head>
    <title>CSS SESSIONS</title>

    <!-- internal css : style tag is used for internal css -->
    <style>
      ul {
        background: tan;
        color: red;
      }

      h1 {
        background-color: pink;
      }
    </style>

    <!-- external css :  used to connect external css with html -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- inline css : style attribute is used for inline css -->
    <h1 style="background-color: red; color: green">CSS SESSIONS</h1>

    <ul>
      <li>Apple</li>
      <li>Banana</li>
    </ul>
  </body>
</html>
